name: Docs CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  verify-project-table:
    name: Verify project table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: python -m pip install --disable-pip-version-check pyyaml
      - name: README project table matches repos.yml
        run: python scripts/generate_project_table.py --check README.md
